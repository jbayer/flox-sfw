  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "cargo": {
        "pkg-path": "cargo"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "nodejs": {
        "pkg-path": "nodejs"
      },
