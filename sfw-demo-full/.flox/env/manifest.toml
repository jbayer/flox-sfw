schema-version = "1.12.0"

[install]
# jbayer/sfw is on FloxHub - first activation may need `flox auth login`;
# subsequent activations work offline once the package is in /nix/store.
# It ships PATH shims at $FLOX_ENV/libexec/sfw-shims that route the
# common package managers (npm, yarn, pnpm, pip, uv, cargo) through sfw
# transparently when that dir is on PATH.
sfw.pkg-path = "jbayer/sfw"
nodejs.pkg-path = "nodejs"
pip.pkg-path = "python313Packages.pip"
cargo.pkg-path = "cargo"
gum.pkg-path = "gum"

[hook]
on-activate = '''
# Per-environment "global" install locations so package-manager installs
# land inside $FLOX_ENV_CACHE without sudo or polluting $HOME.
export NPM_CONFIG_PREFIX="$FLOX_ENV_CACHE/npm-global"
mkdir -p "$NPM_CONFIG_PREFIX/bin"
export CARGO_HOME="$FLOX_ENV_CACHE/cargo"
mkdir -p "$CARGO_HOME/bin"

# pip on nixpkgs python has require-virtualenv set in its site config,
# is marked EXTERNALLY-MANAGED (PEP 668), and has --user disabled. The
# only install mode it allows is `pip install --target=<dir>`.
unset PIP_CONFIG_FILE
export PIP_REQUIRE_VIRTUALENV=false
export PIP_BREAK_SYSTEM_PACKAGES=true
export PIP_TARGET="$FLOX_ENV_CACHE/pip-target"
mkdir -p "$PIP_TARGET"

# Route all supported package managers through sfw transparently
# (shims shipped with the jbayer/sfw package). Also re-prepended in
# [profile.common] so the interactive shell's PATH (which flox may
# reset to put $FLOX_ENV/bin first after on-activate runs) still
# resolves npm/pip/cargo to the shim.
export PATH="$FLOX_ENV/libexec/sfw-shims:$NPM_CONFIG_PREFIX/bin:$CARGO_HOME/bin:$PATH"

gum style \
  --border rounded --border-foreground 212 \
  --padding "1 2" --margin "1 0" \
  "$(gum style --bold --foreground 212 'Socket Firewall demo - full (sfw-demo-full)')" \
  "" \
  "$(gum style --bold --foreground 196 'WARNING: recommend running inside a container or sandbox')" \
  "" \
  "$(gum style --italic 'npm, pip, and cargo route through sfw automatically via the shipped shims.')" \
  "" \
  "$(gum style --bold 'npm (live block expected):')" \
  "  npm install lodahs" \
  "" \
  "$(gum style --bold 'pip (likely taken down - shows sfw wrapping pip):')" \
  "  pip install fabrice" \
  "" \
  "$(gum style --bold 'cargo (likely yanked - shows sfw wrapping cargo):')" \
  "  cargo install rustdecimal" \
  "" \
  "Full walkthrough and contrast cases: README.md"
'''

[profile]
common = '''
# Re-prepend the sfw shim dir in the user's interactive shell. flox's
# interactive activation can put $FLOX_ENV/bin before our hook's PATH
# changes, which would let plain `npm`/`pip`/`cargo` bypass the shim.
export PATH="$FLOX_ENV/libexec/sfw-shims:$PATH"
'''

# Re-prepend the shim dir on every prompt. Without this, sourcing a
# script that mutates PATH after `flox activate` - most commonly a
# Python venv's bin/activate - puts the venv's bin (with its own pip)
# in front of the sfw shim, and pip calls bypass Socket Firewall.
bash = '''
_sfw_shim_dir="$FLOX_ENV/libexec/sfw-shims"
_sfw_ensure_shim_path() {
  case ":$PATH:" in
    "$_sfw_shim_dir:"*) return ;;
  esac
  local cleaned=":$PATH:"
  cleaned="${cleaned//:$_sfw_shim_dir:/:}"
  cleaned="${cleaned#:}"; cleaned="${cleaned%:}"
  export PATH="$_sfw_shim_dir:$cleaned"
}
case ";${PROMPT_COMMAND:-};" in
  *";_sfw_ensure_shim_path;"*) ;;
  *) PROMPT_COMMAND="_sfw_ensure_shim_path;${PROMPT_COMMAND:-}" ;;
esac
'''

zsh = '''
_sfw_shim_dir="$FLOX_ENV/libexec/sfw-shims"
_sfw_ensure_shim_path() {
  case ":$PATH:" in
    "$_sfw_shim_dir:"*) return ;;
  esac
  local cleaned=":$PATH:"
  cleaned="${cleaned//:$_sfw_shim_dir:/:}"
  cleaned="${cleaned#:}"; cleaned="${cleaned%:}"
  export PATH="$_sfw_shim_dir:$cleaned"
}
autoload -Uz add-zsh-hook 2>/dev/null
if (( $+functions[add-zsh-hook] )); then
  add-zsh-hook precmd _sfw_ensure_shim_path
fi
'''

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
  "x86_64-linux",
]
