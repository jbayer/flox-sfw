    "vars": {
      "SFW_SHA256_DARWIN_ARM64": "fd75944bddc663bee2b19f15367706387113d9609fea4f51b02fc3b5dbdb9281",
      "SFW_SHA256_LINUX_ARM64": "d7e969c17e6d23ac1cb0dea81ff87ef9bca2d83570270d91aab14b2a7fb66ad4",
      "SFW_VERSION": "1.10.0"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux"
      ]
    },
    "build": {
      "sfw": {
        "command": "  set -euo pipefail\n\n  case \"$(uname -s)-$(uname -m)\" in\n    Darwin-arm64)\n      asset=\"sfw-free-macos-arm64\"\n      expected_sha=\"$SFW_SHA256_DARWIN_ARM64\"\n      ;;\n    Linux-aarch64)\n      asset=\"sfw-free-linux-arm64\"\n      expected_sha=\"$SFW_SHA256_LINUX_ARM64\"\n      ;;\n    *)\n      echo \"Unsupported system: $(uname -sm)\" >&2\n      exit 1\n      ;;\n  esac\n\n  url=\"https://github.com/SocketDev/sfw-free/releases/download/v${SFW_VERSION}/${asset}\"\n  echo \"Downloading ${url}\"\n  curl --fail --silent --show-error --location --output sfw \"$url\"\n\n  echo \"${expected_sha}  sfw\" | sha256sum -c -\n\n  mkdir -p \"$out/bin\"\n  mv sfw \"$out/bin/sfw\"\n  chmod +x \"$out/bin/sfw\"\n\n  # Per-ecosystem PATH shims. Consumers opt in by prepending\n  # $FLOX_ENV/libexec/sfw-shims to their PATH (e.g. in [hook] on-activate),\n  # which transparently routes each package-manager call through `sfw`\n  # in interactive shells, scripts, sub-processes, and CI alike.\n  mkdir -p \"$out/libexec/sfw-shims\"\n  cat > \"$out/libexec/sfw-shims/sfw-shim\" <<'SHIM_EOF'\n#!/usr/bin/env bash\n# Routes calls through `sfw` for Socket Firewall protection. Multiple\n# package-manager names are symlinked to this single script; basename\n# is used to dispatch to the right real binary.\nshim_dir=\"$(cd \"$(dirname \"$0\")\" && pwd)\"\ncmd_name=\"$(basename \"$0\")\"\nreal=\"\"\nIFS=:; for d in $PATH; do\n  [ \"$d\" = \"$shim_dir\" ] && continue\n  if [ -x \"$d/$cmd_name\" ]; then real=\"$d/$cmd_name\"; break; fi\ndone\nif [ -z \"$real\" ]; then\n  echo \"sfw-shim: real $cmd_name not found on PATH\" >&2\n  exit 127\nfi\n# Recursion guard: if sfw re-execs us via PATH, just run the real binary.\nif [ -n \"${_SFW_WRAPPING:-}\" ]; then\n  exec \"$real\" \"$@\"\nfi\nexport _SFW_WRAPPING=1\nexec sfw \"$real\" \"$@\"\nSHIM_EOF\n  chmod +x \"$out/libexec/sfw-shims/sfw-shim\"\n  for cmd in npm yarn pnpm pip uv cargo; do\n    ln -s sfw-shim \"$out/libexec/sfw-shims/$cmd\"\n  done\n",
        "runtime-packages": [],
        "sandbox": "off",
        "version": "1.10.0",
        "description": "Socket Firewall Free - wraps your package manager to prevent installation of malicious packages"
      }
    }
