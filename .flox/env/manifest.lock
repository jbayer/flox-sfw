  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "coreutils": {
        "pkg-path": "coreutils"
      },
      "curl": {
        "pkg-path": "curl"
      }
    },
    "vars": {
      "SFW_SHA256_DARWIN_ARM64": "b7d01794366c423334a0595509690562a1eaceef0c1daeb1e1b8261f068d5a27",
      "SFW_SHA256_LINUX_ARM64": "affceaccc22e8e84b59349cf493e206e2c17b442cec378d796209c026f140571",
      "SFW_SHA256_LINUX_X86_64": "b74c3fa54e6e2afcc9b780119d615b814ab19cc7ce2ef4543176870cb09170a2",
      "SFW_VERSION": "1.11.0"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "build": {
      "sfw": {
        "command": "  set -euo pipefail\n\n  case \"$(uname -s)-$(uname -m)\" in\n    Darwin-arm64)\n      asset=\"sfw-free-macos-arm64\"\n      expected_sha=\"$SFW_SHA256_DARWIN_ARM64\"\n      ;;\n    Linux-aarch64)\n      asset=\"sfw-free-linux-arm64\"\n      expected_sha=\"$SFW_SHA256_LINUX_ARM64\"\n      ;;\n    Linux-x86_64)\n      asset=\"sfw-free-linux-x86_64\"\n      expected_sha=\"$SFW_SHA256_LINUX_X86_64\"\n      ;;\n    *)\n      echo \"Unsupported system: $(uname -sm)\" >&2\n      exit 1\n      ;;\n  esac\n\n  url=\"https://github.com/SocketDev/sfw-free/releases/download/v${SFW_VERSION}/${asset}\"\n  echo \"Downloading ${url}\"\n  curl --fail --silent --show-error --location --output sfw \"$url\"\n\n  echo \"${expected_sha}  sfw\" | sha256sum -c -\n\n  mkdir -p \"$out/bin\"\n  mv sfw \"$out/bin/sfw\"\n  chmod +x \"$out/bin/sfw\"\n\n  # Per-ecosystem PATH shims. Consumers opt in by prepending\n  # $FLOX_ENV/libexec/sfw-shims to their PATH (e.g. in [hook] on-activate),\n  # which transparently routes each package-manager call through `sfw`\n  # in interactive shells, scripts, sub-processes, and CI alike.\n  mkdir -p \"$out/libexec/sfw-shims\"\n  cat > \"$out/libexec/sfw-shims/sfw-shim\" <<'SHIM_EOF'\n#!/usr/bin/env bash\n# Routes calls through `sfw` for Socket Firewall protection. Multiple\n# package-manager names are symlinked to this single script; basename\n# is used to dispatch to the right real binary.\nshim_dir=\"$(cd \"$(dirname \"$0\")\" && pwd)\"\ncmd_name=\"$(basename \"$0\")\"\nreal=\"\"\nIFS=:; for d in $PATH; do\n  [ \"$d\" = \"$shim_dir\" ] && continue\n  if [ -x \"$d/$cmd_name\" ]; then real=\"$d/$cmd_name\"; break; fi\ndone\nif [ -z \"$real\" ]; then\n  echo \"sfw-shim: real $cmd_name not found on PATH\" >&2\n  exit 127\nfi\n# Recursion guard: if sfw re-execs us via PATH, just run the real binary.\nif [ -n \"${_SFW_WRAPPING:-}\" ]; then\n  exec \"$real\" \"$@\"\nfi\nexport _SFW_WRAPPING=1\nexec sfw \"$real\" \"$@\"\nSHIM_EOF\n  chmod +x \"$out/libexec/sfw-shims/sfw-shim\"\n  for cmd in npm yarn pnpm pip uv cargo; do\n    ln -s sfw-shim \"$out/libexec/sfw-shims/$cmd\"\n  done\n\n  # Sourceable helpers that consumers can drop into [profile.bash] /\n  # [profile.zsh]. They (1) prepend the shim dir to PATH and (2)\n  # install a prompt hook that re-prepends it - so when the user\n  # later sources a third-party activate script (e.g. a Python venv's\n  # bin/activate) that prepends its own bin, our shim dir is restored\n  # to the front of PATH before the next command runs.\n  cat > \"$out/libexec/sfw-shims/activate.bash\" <<'ACT_BASH_EOF'\n# Source from your env's [profile.bash]:\n#   source \"$FLOX_ENV/libexec/sfw-shims/activate.bash\"\n_sfw_shim_dir=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)\"\ncase \":$PATH:\" in\n  *\":$_sfw_shim_dir:\"*) ;;\n  *) export PATH=\"$_sfw_shim_dir:$PATH\" ;;\nesac\n_sfw_ensure_shim_path() {\n  case \":$PATH:\" in\n    \"$_sfw_shim_dir:\"*) return ;;\n  esac\n  local cleaned=\":$PATH:\"\n  cleaned=\"${cleaned//:$_sfw_shim_dir:/:}\"\n  cleaned=\"${cleaned#:}\"; cleaned=\"${cleaned%:}\"\n  export PATH=\"$_sfw_shim_dir:$cleaned\"\n}\ncase \";${PROMPT_COMMAND:-};\" in\n  *\";_sfw_ensure_shim_path;\"*) ;;\n  *) PROMPT_COMMAND=\"_sfw_ensure_shim_path;${PROMPT_COMMAND:-}\" ;;\nesac\nACT_BASH_EOF\n\n  cat > \"$out/libexec/sfw-shims/activate.zsh\" <<'ACT_ZSH_EOF'\n# Source from your env's [profile.zsh]:\n#   source \"$FLOX_ENV/libexec/sfw-shims/activate.zsh\"\n# Use logical path (no :A symlink resolution) so this matches the\n# $FLOX_ENV/libexec/... form a consumer's PATH actually has.\n_sfw_shim_dir=\"$(cd \"${${(%):-%N}:h}\" && pwd)\"\ncase \":$PATH:\" in\n  *\":$_sfw_shim_dir:\"*) ;;\n  *) export PATH=\"$_sfw_shim_dir:$PATH\" ;;\nesac\n_sfw_ensure_shim_path() {\n  case \":$PATH:\" in\n    \"$_sfw_shim_dir:\"*) return ;;\n  esac\n  local cleaned=\":$PATH:\"\n  cleaned=\"${cleaned//:$_sfw_shim_dir:/:}\"\n  cleaned=\"${cleaned#:}\"; cleaned=\"${cleaned%:}\"\n  export PATH=\"$_sfw_shim_dir:$cleaned\"\n}\nautoload -Uz add-zsh-hook 2>/dev/null\nif (( $+functions[add-zsh-hook] )); then\n  add-zsh-hook precmd _sfw_ensure_shim_path\nfi\nACT_ZSH_EOF\n",
        "runtime-packages": [],
        "sandbox": "off",
        "version": "1.11.0",
        "description": "Socket Firewall Free - wraps your package manager to prevent installation of malicious packages"
      }
    }
  },
