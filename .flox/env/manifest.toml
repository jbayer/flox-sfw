## Flox packaging of Socket Firewall Free (sfw)
##
## Upstream:  https://github.com/SocketDev/sfw-free
## Releases:  https://github.com/SocketDev/sfw-free/releases
##
## To bump the pinned version, update:
##   - [build.sfw] version
##   - [vars] SFW_VERSION
##   - [vars] SFW_SHA256_DARWIN_ARM64
##   - [vars] SFW_SHA256_LINUX_ARM64
##   - [vars] SFW_SHA256_LINUX_X86_64
## then `flox build sfw`. (The update-check workflow handles this for you.)
schema-version = "1.12.0"

[install]
curl.pkg-path = "curl"
coreutils.pkg-path = "coreutils"

[vars]
SFW_VERSION = "1.12.0"
SFW_SHA256_DARWIN_ARM64 = "319aeba93d5e57c2db68d6709e5a04aa122e326b2d95a27c1074d0a84c567031"
SFW_SHA256_LINUX_ARM64 = "598c8d19c80832ef5ca7fdb0a9fc35c045847fd02889126a7115c0345a478da3"
SFW_SHA256_LINUX_X86_64 = "51824f02a242f892c61c42223e05b7e82bb624762337f026afc2ac229ffcade7"

[build.sfw]
description = "Socket Firewall Free - wraps your package manager to prevent installation of malicious packages"
version = "1.12.0"
sandbox = "off"
runtime-packages = []
command = '''
  set -euo pipefail

  case "$(uname -s)-$(uname -m)" in
    Darwin-arm64)
      asset="sfw-free-macos-arm64"
      expected_sha="$SFW_SHA256_DARWIN_ARM64"
      ;;
    Linux-aarch64)
      asset="sfw-free-linux-arm64"
      expected_sha="$SFW_SHA256_LINUX_ARM64"
      ;;
    Linux-x86_64)
      asset="sfw-free-linux-x86_64"
      expected_sha="$SFW_SHA256_LINUX_X86_64"
      ;;
    *)
      echo "Unsupported system: $(uname -sm)" >&2
      exit 1
      ;;
  esac

  url="https://github.com/SocketDev/sfw-free/releases/download/v${SFW_VERSION}/${asset}"
  echo "Downloading ${url}"
  curl --fail --silent --show-error --location --output sfw "$url"

  echo "${expected_sha}  sfw" | sha256sum -c -

  mkdir -p "$out/bin"
  mv sfw "$out/bin/sfw"
  chmod +x "$out/bin/sfw"

  # Per-ecosystem PATH shims. Consumers opt in by prepending
  # $FLOX_ENV/libexec/sfw-shims to their PATH (e.g. in [hook] on-activate),
  # which transparently routes each package-manager call through `sfw`
  # in interactive shells, scripts, sub-processes, and CI alike.
  mkdir -p "$out/libexec/sfw-shims"
  cat > "$out/libexec/sfw-shims/sfw-shim" <<'SHIM_EOF'
#!/usr/bin/env bash
# Routes calls through `sfw` for Socket Firewall protection. Multiple
# package-manager names are symlinked to this single script; basename
# is used to dispatch to the right real binary.
shim_dir="$(cd "$(dirname "$0")" && pwd)"
cmd_name="$(basename "$0")"
real=""
IFS=:; for d in $PATH; do
  [ "$d" = "$shim_dir" ] && continue
  if [ -x "$d/$cmd_name" ]; then real="$d/$cmd_name"; break; fi
done
if [ -z "$real" ]; then
  echo "sfw-shim: real $cmd_name not found on PATH" >&2
  exit 127
fi
# Recursion guard: if sfw re-execs us via PATH, just run the real binary.
if [ -n "${_SFW_WRAPPING:-}" ]; then
  exec "$real" "$@"
fi
export _SFW_WRAPPING=1
exec sfw "$real" "$@"
SHIM_EOF
  chmod +x "$out/libexec/sfw-shims/sfw-shim"
  for cmd in npm yarn pnpm pip uv cargo; do
    ln -s sfw-shim "$out/libexec/sfw-shims/$cmd"
  done

  # Sourceable helpers that consumers can drop into [profile.bash] /
  # [profile.zsh]. They (1) prepend the shim dir to PATH and (2)
  # install a prompt hook that re-prepends it - so when the user
  # later sources a third-party activate script (e.g. a Python venv's
  # bin/activate) that prepends its own bin, our shim dir is restored
  # to the front of PATH before the next command runs.
  cat > "$out/libexec/sfw-shims/activate.bash" <<'ACT_BASH_EOF'
# Source from your env's [profile.bash]:
#   source "$FLOX_ENV/libexec/sfw-shims/activate.bash"
_sfw_shim_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
case ":$PATH:" in
  *":$_sfw_shim_dir:"*) ;;
  *) export PATH="$_sfw_shim_dir:$PATH" ;;
esac
_sfw_ensure_shim_path() {
  case ":$PATH:" in
    "$_sfw_shim_dir:"*) return ;;
  esac
  local cleaned=":$PATH:"
  cleaned="${cleaned//:$_sfw_shim_dir:/:}"
  cleaned="${cleaned#:}"; cleaned="${cleaned%:}"
  export PATH="$_sfw_shim_dir:$cleaned"
}
case ";${PROMPT_COMMAND:-};" in
  *";_sfw_ensure_shim_path;"*) ;;
  *) PROMPT_COMMAND="_sfw_ensure_shim_path;${PROMPT_COMMAND:-}" ;;
esac
ACT_BASH_EOF

  cat > "$out/libexec/sfw-shims/activate.zsh" <<'ACT_ZSH_EOF'
# Source from your env's [profile.zsh]:
#   source "$FLOX_ENV/libexec/sfw-shims/activate.zsh"
# Use logical path (no :A symlink resolution) so this matches the
# $FLOX_ENV/libexec/... form a consumer's PATH actually has.
_sfw_shim_dir="$(cd "${${(%):-%N}:h}" && pwd)"
case ":$PATH:" in
  *":$_sfw_shim_dir:"*) ;;
  *) export PATH="$_sfw_shim_dir:$PATH" ;;
esac
_sfw_ensure_shim_path() {
  case ":$PATH:" in
    "$_sfw_shim_dir:"*) return ;;
  esac
  local cleaned=":$PATH:"
  cleaned="${cleaned//:$_sfw_shim_dir:/:}"
  cleaned="${cleaned#:}"; cleaned="${cleaned%:}"
  export PATH="$_sfw_shim_dir:$cleaned"
}
autoload -Uz add-zsh-hook 2>/dev/null
if (( $+functions[add-zsh-hook] )); then
  add-zsh-hook precmd _sfw_ensure_shim_path
fi
ACT_ZSH_EOF
'''

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
  "x86_64-linux",
]
