## sfw-demo - consumption environment demonstrating Socket Firewall Free
##
## Activating this environment puts `sfw` and `node`/`npm` on PATH.
## See README.md in this directory for the typosquat-blocking demo.
##
## WARNING: The demo intentionally attempts to install a real malicious
## npm package (lodahs). Run only inside a devcontainer or other
## throwaway sandbox.
##
## NOTE: `jbayer/sfw` is published on FloxHub. The first `flox activate`
## fetches it and may require `flox auth login` if you haven't already.
## Once the package is in the local /nix/store you can activate offline;
## you'll only need to re-authenticate when checking for upgrades
## (`flox upgrade` / `flox install` against a newer release).
schema-version = "1.12.0"

[install]
sfw.pkg-path = "jbayer/sfw"
nodejs.pkg-path = "nodejs"

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
]
