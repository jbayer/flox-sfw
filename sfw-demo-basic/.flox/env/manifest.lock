  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "gum": {
        "pkg-path": "gum"
      },
      "sfw": {
        "pkg-path": "jbayer/sfw"
      }
    },
    "hook": {
      "on-activate": "# Route any supported package manager on PATH through sfw transparently\n# (shims shipped with the jbayer/sfw package). Also re-prepended in\n# [profile.common] so the interactive shell's PATH (which flox may\n# reset to put $FLOX_ENV/bin first after on-activate runs) still\n# resolves the shimmed names to the shim.\nexport PATH=\"$FLOX_ENV/libexec/sfw-shims:$PATH\"\n\ngum style \\\n  --border rounded --border-foreground 212 \\\n  --padding \"1 2\" --margin \"1 0\" \\\n  \"$(gum style --bold --foreground 212 'Socket Firewall demo - basic (sfw-demo-basic)')\" \\\n  \"\" \\\n  \"$(gum style --bold --foreground 196 'WARNING: recommend running inside a container or sandbox')\" \\\n  \"\" \\\n  \"$(gum style --italic 'Minimal env: just jbayer/sfw + its shipped shims on PATH.')\" \\\n  \"$(gum style --italic 'Bring your own npm/yarn/pnpm/pip/uv/cargo (system, layered env, etc.) and the shims route them through sfw.')\" \\\n  \"\" \\\n  \"$(gum style --bold 'Examples (require the relevant tool on PATH):')\" \\\n  \"  npm install lodahs\" \\\n  \"  yarn add lodahs\" \\\n  \"  pnpm add lodahs\" \\\n  \"  pip install fabrice\" \\\n  \"  uv pip install fabrice\" \\\n  \"  cargo install rustdecimal\" \\\n  \"\" \\\n  \"Need pre-installed tooling and writable install targets? See sfw-demo-full.\"\n"
    },
    "profile": {
      "common": "# Re-prepend the sfw shim dir in the user's interactive shell. flox's\n# interactive activation can put $FLOX_ENV/bin before our hook's PATH\n# changes, which would let plain `npm`/`pip`/`cargo` bypass the shim.\nexport PATH=\"$FLOX_ENV/libexec/sfw-shims:$PATH\"\n",
      "bash": "source \"$FLOX_ENV/libexec/sfw-shims/activate.bash\"\n",
      "zsh": "source \"$FLOX_ENV/libexec/sfw-shims/activate.zsh\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    }
  },
